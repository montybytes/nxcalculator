name: nxcalculator
description: "A calculator that fits into the Nothing OS ecosystem of apps."

publish_to: "none"

version: 1.2.2-a

environment:
  sdk: ^3.8.1

dependencies:
  decimal: ^3.2.4
  flutter:
    sdk: flutter
  intl: ^0.20.2
  nxdesign:
    git:
      url: https://github.com/montybytes/nxdesign.git
      ref: main
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  shared_preferences_platform_interface: ^2.4.1

flutter:
  assets:
    - assets/
    - assets/fonts/
    - assets/icons/
    - assets/icons/light/
    - assets/icons/dark/

  fonts:
    - family: NType
      fonts:
        - asset: assets/fonts/NType82.otf
    - family: NDot
      fonts:
        - asset: assets/fonts/NDot77.otf
    - family: LetteraMono
      fonts:
        - asset: assets/fonts/LetteraMono.otf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.otf
